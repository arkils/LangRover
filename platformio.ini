; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectdoc/platformio-ini.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor settings
monitor_speed = 115200
monitor_filters = 
    direct  ; Do not buffer stdout

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.0.0

; Build flags (optional)
build_flags = 
    -D CORE_DEBUG_LEVEL=3  ; Debug level (0=None, 5=Verbose)

; Upload settings
upload_speed = 921600

; Optional: specify custom upload port
; upload_port = /dev/ttyACM0  ; Linux
; upload_port = COM3          ; Windows
